name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate Release Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Tag Format
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re

          ref_name = os.environ["GITHUB_REF_NAME"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", ref_name):
              raise SystemExit(
                  f"Release tag must be stable semantic version like v1.2.3, got: {ref_name}"
              )
          print(f"Release tag format OK: {ref_name}")
          PY

      - name: Validate Changelog Entry Exists
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          if f"## {version}" not in changelog:
              raise SystemExit(f"CHANGELOG.md is missing section for {version}")
          print(f"CHANGELOG entry found for {version}")
          PY

  build:
    needs: validate-release
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: FlowScroll_Win_${{ github.ref_name }}.exe
            artifact_path: build_out/FlowScroll_Win_${{ github.ref_name }}.exe
          - os: macos-latest
            artifact_name: FlowScroll_Mac_${{ github.ref_name }}.dmg
            artifact_path: FlowScroll_Mac_${{ github.ref_name }}.dmg
          - os: ubuntu-latest
            artifact_name: FlowScroll_Linux_x86_${{ github.ref_name }}.AppImage
            artifact_path: FlowScroll_Linux_x86_${{ github.ref_name }}.AppImage

    steps:
      - name: 检出代码 (Checkout Code)
        uses: actions/checkout@v4

      - name: 将 Tag 版本注入到 FlowScroll/__init__.py
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${TAG_VERSION}" >> "$GITHUB_ENV"
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"]
          if version.startswith("v"):
              version = version[1:]

          version_file = Path("FlowScroll/__init__.py")
          content = version_file.read_text(encoding="utf-8")
          pattern = r"""__version__\s*=\s*(['"])[^'"]+\1"""
          if not re.search(pattern, content):
              raise SystemExit("Failed to locate __version__ assignment in FlowScroll/__init__.py")
          updated = re.sub(
              pattern,
              f'__version__ = "{version}"',
              content,
              count=1,
          )
          version_file.write_text(updated, encoding="utf-8")
          print(f"Synchronized FlowScroll version to {version}")
          PY

      - name: 验证注入的版本
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          text = Path("FlowScroll/__init__.py").read_text(encoding="utf-8")
          match = re.search(r"""__version__\s*=\s*['"]([^'"]+)['"]""", text)
          if not match:
              raise SystemExit("Unable to read __version__ from FlowScroll/__init__.py")
          print(f"FlowScroll.__version__ = {match.group(1)}")
          PY

      - name: 安装 uv (Setup uv)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: 设置 Python 环境
        run: uv python install 3.12

      - name: 安装项目依赖
        run: uv sync

      - name: 安装 Nuitka
        run: uv pip install Nuitka

      - name: 构建 Windows 版本
        if: matrix.os == 'windows-latest'
        run: |
          uv run python -m nuitka --assume-yes-for-downloads --standalone --onefile --enable-plugin=pyside6 --include-qt-plugins=platforms,styles,imageformats --windows-console-mode=disable --windows-icon-from-ico=logo.ico --include-data-files=logo.ico=logo.ico --include-data-files=main.py=main.py --include-data-dir=FlowScroll/resources=FlowScroll/resources --include-data-dir=FlowScroll/locales=FlowScroll/locales --output-dir=build_out -o FlowScroll_Win_${{ github.ref_name }}.exe main.py

      - name: 构建 macOS 版本
        if: matrix.os == 'macos-latest'
        run: |
          if [ -f "logo.icns" ]; then
            ICON_ARG="--macos-app-icon=logo.icns"
          else
            ICON_ARG=""
          fi

          uv run python -m nuitka --assume-yes-for-downloads --standalone --macos-create-app-bundle --enable-plugin=pyside6 $ICON_ARG --include-data-files=main.py=main.py --include-data-dir=FlowScroll/resources=FlowScroll/resources --include-data-dir=FlowScroll/locales=FlowScroll/locales --macos-app-name="FlowScroll" --output-dir=build_out main.py

          if [ -d "build_out/main.app" ]; then
            mv build_out/main.app "build_out/FlowScroll.app"
          fi

          test -d "build_out/FlowScroll.app"
          find "build_out/FlowScroll.app" -path "*FlowScroll/resources/FlowScroll.svg" | grep -q .
          find "build_out/FlowScroll.app" -path "*FlowScroll/locales/en-US.json" | grep -q .

          brew install create-dmg

          create-dmg \
            --volname "FlowScroll Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "FlowScroll.app" 175 120 \
            --hide-extension "FlowScroll.app" \
            --app-drop-link 425 120 \
            "FlowScroll_Mac_${{ github.ref_name }}.dmg" \
            "build_out/FlowScroll.app/"

      - name: 构建 Linux 版本 (AppImage)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2t64 binutils libxcb-cursor0 imagemagick

          uv run python -m nuitka --assume-yes-for-downloads --standalone --enable-plugin=pyside6 --include-data-dir=FlowScroll/resources=FlowScroll/resources --include-data-dir=FlowScroll/locales=FlowScroll/locales --output-dir=build_out -o FlowScroll_Linux main.py

          find build_out -path "*/FlowScroll/resources/FlowScroll.svg" | grep -q .
          find build_out -path "*/FlowScroll/locales/en-US.json" | grep -q .

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp -r build_out/*.dist/* AppDir/usr/bin/

          find AppDir/usr/bin -path "*/FlowScroll/resources/FlowScroll.svg" | grep -q .
          find AppDir/usr/bin -path "*/FlowScroll/locales/en-US.json" | grep -q .

          cat > AppDir/FlowScroll.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=FlowScroll
          Exec=FlowScroll_Linux
          Icon=flowscroll
          Categories=Utility;
          EOF

          cp AppDir/FlowScroll.desktop AppDir/usr/share/applications/FlowScroll.desktop

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          exec "$HERE/usr/bin/FlowScroll_Linux" "$@"
          EOF
          chmod +x AppDir/AppRun

          if [ -f "FlowScroll/resources/FlowScroll.svg" ]; then
            convert -background none -size 256x256 FlowScroll/resources/FlowScroll.svg AppDir/flowscroll.png
          elif [ -f "logo.ico" ]; then
            convert logo.ico -resize 256x256 AppDir/flowscroll.png
          else
            convert -size 256x256 xc:#3B82F6 -gravity center -pointsize 100 -fill white -annotate 0 "FS" AppDir/flowscroll.png
          fi

          cp AppDir/flowscroll.png AppDir/usr/share/icons/hicolor/256x256/apps/flowscroll.png

          curl -Lo appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          ./appimagetool --appimage-extract-and-run AppDir "FlowScroll_Linux_x86_${{ github.ref_name }}.AppImage"
          test -f "FlowScroll_Linux_x86_${{ github.ref_name }}.AppImage"

      - name: 上传构建产物 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout Code)
        uses: actions/checkout@v4

      - name: 下载所有构建产物 (Download Artifacts)
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: 检查产物
        run: |
          echo "Artifacts list:"
          ls -lah artifacts

      - name: 自动发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
